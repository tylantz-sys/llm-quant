design_summary: 'BTC regime filter (SMA20 > SMA50 AND price > SMA50) gates crypto
  market participation. When in bull regime, hold the top-1 alt (ETH/ADA/SOL/XRP)
  by 10-day return momentum. Exit to cash when regime flips or position stop fires
  (7%). Portfolio NAV circuit breaker: if NAV drops 18% from rolling peak, liquidate
  and stay flat for 10 days (watermark resets on re-entry).

  '
