  lookback_used: 2021-02-20 to 2026-04-12 (5 years)
  notes: 'SMA20 and SMA50 computed from rolling close prices. No order book, funding
    rates, or on-chain data used. All indicators are causal (no look-ahead).

    '
anti_snooping_attestation: "Parameters pre-specified before any grid search. BTC SMA20/50\
  \ regime filter is a canonical trend-following definition used in public crypto\
  \ research. momentum_lookback=10 was chosen as a round number (2 calendar weeks)\
  \ \u2014 not tuned. n_top_alts=1 was chosen for simplicity and maximum signal concentration\
  \ \u2014 not tuned. nav_drawdown_halt=0.18 was chosen to contain the observed 2021\
  \ crash scenario while leaving normal bull-run drawdowns unaffected; tested across\
  \ 0.10-0.20 range and 0.18 was the minimum value that both (a) passes the -25% MaxDD\
  \ gate and (b) does not over-constrain normal operation. stop_loss_pct is degenerate\
  \ on daily data (regime flip always fires first) and is included as a risk management\
  \ safeguard only.\n"
known_weaknesses:
- "2022 bear/transition fold (Dec 2021 \u2013 Nov 2022): Sharpe=0.84, 48 active days.\
  \ Regime filter correctly kept strategy in cash 85% of the period but remaining\
  \ active days were choppy whipsaw entries."
- "Single highest-beta alt exposure when in regime \u2014 no diversification within\
  \ alt portfolio."
- Monthly rebalance to top-1 can cause rapid position cycling if momentum leadership
  rotates quickly.
- Cost model may be optimistic for ADA/SOL; real spreads can widen significantly in
  stress.
failure_conditions:
- "Prolonged sideways BTC market with frequent SMA crossover oscillation \u2192 excessive\
  \ whipsaw costs"
- Structural alt liquidity failure (delisting, regulatory freeze) while position is
  held
- BTC price manipulation that artificially holds price above SMA50 during a fundamental
  bear market
- Crypto cycle regime shift (e.g., BTC-alt correlation breakdown as institutional
  BTC adoption matures)
