# ---- POST-BACKTEST FAILURE RECORD (appended, frozen_hash remains valid) ----
failure_record:
  lifecycle_stage: FAILED
  failed_at: '2026-04-17'
  root_cause: look_ahead_bias_in_pre_registration
  engine_trial: 9c175aa1  # trial 3 (first valid run)
  engine_metrics_1x_cost:
    sharpe: 0.745
    max_drawdown: -0.5571
    annualized_return: 0.2881
    profit_factor: 1.52
    dsr: 0.908
    total_return: 4.949
  gates_failed:
    - "Sharpe 0.745 < 1.0 (Track B minimum)"
    - "MaxDD -55.7% < -30% (Track B maximum)"
    - "DSR 0.908 < 0.95"
  gap_explanation: >
    Pre-registered metrics (Sharpe=3.106, MaxDD=-23.28%) were computed in a research
    simulation that credited the ENTRY DAY's return on the same day the position was
    entered (implicit fill_delay=0 on same-day-close entry). The engine correctly uses
    fill_delay=1 (enter at next-day open). On a daily momentum strategy with 100%
    allocation to a single volatile crypto alt, this 1-day gap in execution timing
    produces materially different equity curves. The strategy mechanism is sound (regime
    filter + momentum rotation) but pre-registration results were invalid. MaxDD of
    -55.7% is consistent with 100% exposure to a single alt through the 2022 bear market
    with a slow SMA20/SMA50 regime filter and 1-day exit delay.
  state_pollution_fix: >
    Engine bug fixed concurrently: BacktestEngine.run_with_cost_sensitivity() reused the
    same stateful strategy object across 4 cost-multiplier runs, causing NAV peak from
    run 1 to pollute runs 2-4. Fixed by deep-copying strategy before each non-1x run
    (engine.py, import copy added, deepcopy call before each subsequent run).
  successor: btc-regime-alt-momentum-v2
