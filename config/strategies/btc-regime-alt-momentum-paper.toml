# Pod: btc-regime-alt-momentum-paper
# Paper trading validation for btc-regime-alt-momentum-v3 (Track B)
# Runs via Alpaca paper account every 5 min during crypto market hours.
# Capital sourced from Alpaca equity — uses real portfolio balance, not synthetic.
#
# CAPITAL NOTE: initial_capital_source = "alpaca_equity" reads the FULL Alpaca account
# equity. Both pods (btc-regime + crypto-ethbtc) share the same paper account and each
# sees 100% of equity. There is no cross-pod capital isolation at the broker level.
# Combined exposure is managed implicitly via per-position weight limits.
#
# Promotion gate: 60 days, >=50 trades, Sharpe >= 0.60, MaxDD < 30%
# See: data/strategies/btc-regime-alt-momentum-v3/paper-trading.yaml

[execution]
signal_source = "strategy_overlay"
strategy_set = "candidate_crypto_btcregime"
overlay_governor_strict = true
overlay_max_upscale = 1.25
overlay_max_downscale = 0.0
intraday_enabled = true
intraday_timeframe_minutes = 5
intraday_lookback_days = 10
intraday_rth_guard = false
intraday_use_oco = true
skip_daily_fetch_when_intraday = true
asset_class_filter = ["crypto"]
claude_overlay_only = true
crypto_order_sizing = "qty"
crypto_time_in_force = "gtc"
initial_capital_source = "alpaca_equity"
# ETH-USD is managed exclusively by crypto-ethbtc-paper pod; exclude here to prevent
# cross-pod wash trade conflicts when both pods hold ETH in the same Alpaca account.
symbol_exclude = ["ETH-USD", "ADA-USD"]

# Exit policy overrides — CRITICAL for this strategy.
# Default 2% partial TP + 1.5% trailing stop destroys momentum alpha in crypto.
# These must match the values in the backtest spec exactly.
# Backtest spec (research-spec.yaml line 179): partial_take_profit_enabled = false,
# trailing_stop_pct = 0.12. The 12% partial_pct here is a live-trading addition
# for partial profit harvest; partial_size = 0.50 and remainder_tp_mult = 9999 ensure
# the "remainder" leg never triggers (effectively trailing-stop-only after first partial).
profit_take_partial_pct = 0.12
profit_take_partial_size = 0.50
profit_take_remainder_tp_mult = 9999.0
trailing_stop_pct = 0.12
scale_in_tranches = 1

[strategy]
sleeve = "crypto"

[strategy_rotation]
enabled = false

[risk]
# Track B position limits
crypto_max_position_weight = 0.30

[parameters]
# NOTE: tradeable_alts is only used by generate_signals() which is bypassed when
# claude_overlay_only = true. Symbol restriction is enforced by symbol_exclude above.
tradeable_alts = ["SOL-USD", "XRP-USD"]
