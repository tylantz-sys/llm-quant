claude_overlay_only = true
log_decisions_when_rth_closed = true
expectancy_gate_enabled = false
scale_in_tranches = 1
reentry_cooldown_bars = 1

[strategy]
sleeve = "default"

[strategy_rotation]
enabled = false

[risk]
