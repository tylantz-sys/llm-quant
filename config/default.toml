[general]
db_path = "data/llm_quant.duckdb"
initial_capital = 100_000.0
base_currency = "USD"

[llm]
model = "claude-sonnet-4-20250514"
temperature = 0.0
max_tokens = 4096
max_trades_per_session = 5

[data]
lookback_days = 504  # 2 years of trading days
fetch_timeout = 30
db_lock_timeout_seconds = 30.0
db_lock_retry_seconds = 0.5
db_upsert_timeout_seconds = 30.0
db_upsert_max_retries = 2
db_upsert_retry_seconds = 1.0

[execution]
intraday_enabled = true
intraday_timeframe_minutes = 5
intraday_lookback_days = 10
claude_overlay_only = true
profit_take_partial_pct = 0.02
profit_take_partial_size = 0.50
profit_take_remainder_tp_mult = 2.0
trailing_stop_pct = 0.015
scale_in_tranches = 3
reentry_cooldown_bars = 1

[strategy_rotation]
enabled = true
window_days = 60
top_n = 5
min_trades = 10
cooldown_days = 5

[allocation]

[allocation.strategy_group_caps]
credit_lead_lag = 0.40
overnight_momentum = 0.15
semis_lead_lag = 0.15

[allocation.regime_weight_mult.credit_lead_lag]
risk_on = 1.0
transition = 0.8
risk_off = 0.5

[allocation.regime_weight_mult.overnight_momentum]
risk_on = 1.0
transition = 0.9
risk_off = 0.7

[allocation.regime_weight_mult.semis_lead_lag]
risk_on = 1.0
transition = 0.8
risk_off = 0.5

[logging]
level = "INFO"

[market_context]
# Task 4a1: adaptive VIX regime classification window (trading days)
vix_regime_percentile_window = 252
# Task ev8: credit spread thresholds for silent stress detection
credit_spread_silent_stress_zscore = 1.5   # z-score above which credit is elevated
credit_spread_silent_stress_vix_cap = 20.0  # VIX must be below this for silent_stress=True
