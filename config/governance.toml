# Production Governance Configuration
# All thresholds for the 8 failure mode detectors + kill switches

[regime_drift]
# Compare rolling window performance vs full-history baseline
rolling_window_days = 21          # ~1 month trading days
sharpe_decay_warn = 0.30          # Warning: rolling Sharpe drops 30% vs baseline
sharpe_decay_halt = 0.50          # Hard stop: rolling Sharpe drops 50%
win_rate_decay_warn = 0.15        # Warning: win rate drops 15pp
win_rate_decay_halt = 0.25        # Hard stop: win rate drops 25pp
vol_spike_warn = 1.5              # Warning: rolling vol 1.5x baseline
vol_spike_halt = 2.0              # Hard stop: rolling vol 2x baseline

[alpha_decay]
# Rolling Sharpe vs full-history Sharpe ratio
rolling_window_days = 63          # ~3 months
decay_warn = 0.40                 # Warning: rolling/full ratio < 0.60
decay_halt = 0.60                 # Hard stop: rolling/full ratio < 0.40

[risk_drift]
# Post-trade exposure monitoring vs configured limits
exposure_warn_buffer = 0.10       # Warning at 90% of limit
concentration_warn_buffer = 0.10  # Warning at 90% of sector limit

[data_quality]
# Stale data, price gaps, plausibility
max_stale_days = 3                # Hard stop: any symbol >3 days stale
gap_threshold_pct = 0.20          # Warning: single-day gap >20%
plausibility_min_price = 0.01     # Hard stop: price below $0.01

[process_drift]
# SHA-256 config hash monitoring
tracked_files = [
    "config/default.toml",
    "config/risk.toml",
    "config/universe.toml",
    "config/governance.toml",
    "config/prompts/trader_decision.md",
]

[operational_health]
# Snapshot gaps, stale prices, hash chain
max_snapshot_gap_days = 3         # Warning: no snapshot for >3 days
max_price_staleness_hours = 48    # Warning: prices >48h old
hash_chain_required = true        # Hard stop: hash chain verification fails

[kill_switches]
# 6 automatic halt triggers -- any one triggers full halt (sells only)
max_drawdown_pct = 0.15           # NAV drawdown from peak
max_daily_loss_pct = 0.05         # Single-day loss >5%
max_consecutive_losses = 5        # 5 consecutive losing trades
max_correlation_breach = 0.85     # Portfolio correlation to single asset >85%
data_blackout_hours = 72          # No fresh data for >72h
risk_check_failure_streak = 3     # 3 consecutive risk check failures

[promotion]
# Model Promotion Policy v1.0
# Hard vetoes -- ANY failure blocks promotion
min_deflated_sharpe = 0.95        # DSR >= 0.95
max_pbo = 0.10                    # Probability of Backtest Overfitting <= 10%
max_spa_p_value = 0.05            # Stepwise SPA p-value <= 0.05
min_trl = 1                       # Minimum Trail Length >= 1 (at least 1 out-of-sample period)

# Weighted scorecard (0-100)
scorecard_pass_threshold = 85     # Must score 85+ for live canary

# Paper trading minimums
min_paper_trades = 50             # At least 50 trades in paper
min_paper_days = 30               # At least 30 days paper trading
min_paper_sharpe = 0.60           # Paper Sharpe >= 0.60

# Canary gate
canary_allocation_pct = 0.10      # Start with 10% allocation
canary_min_days = 14              # Minimum 14 days in canary
canary_max_drawdown_pct = 0.10    # Canary drawdown limit (tighter than full)

[profit_taking]
# Profit-taking-first governance overlay.
enabled = true

[profit_taking.score]
# Composite harvest score weights. Should sum to 1.0.
capture_ratio_weight = 0.35
giveback_penalty_weight = 0.25
tp1_hit_rate_weight = 0.15
trailing_preservation_weight = 0.15
runner_retention_weight = 0.10

[profit_taking.promotion]
# Monetization quality gates for promotion and continued eligibility.
min_harvest_ratio = 0.45
max_open_gain_giveback_pct = 0.35
min_tp1_hit_rate = 0.40
min_trailing_preservation_rate = 0.40
min_realized_to_unrealized_ratio = 0.55
min_paper_trades_for_harvest_eval = 30
promotion_block_on_poor_monetization = true

[profit_taking.rotation]
# Ranking/allocation bias toward retaining profits and trimming stale winners.
enabled = true
weight = 0.25
prefer_harvest_over_new_entries = true
stale_winner_trim_required = true
max_days_since_last_harvest = 10

[profit_taking.selection]
# Portfolio-level selection constraints that favor monetization discipline.
enabled = true
reserve_cash_for_rotation = 0.10
require_trim_before_new_entry = false
block_readd_after_partial = true
min_realized_to_unrealized_ratio = 0.55

[profit_taking.overlay_evaluation]
# Evaluate Claude/overlay quality by realized harvest outcomes.
enabled = true
require_mandate_alignment = true
realized_edge_weight = 0.50
harvest_rate_edge_weight = 0.30
giveback_control_weight = 0.20

[profit_taking.mandates.default]
enabled = true
mandate_type = "balanced_harvest"
harvest_priority = 50
tp1_target_pct = 0.02
tp1_size = 0.50
runner_tp_mult = 2.0
trailing_stop_pct = 0.015
max_giveback_pct = 0.35
min_harvest_ratio = 0.45
stale_winner_days = 5
allow_reentry_after_partial = false
eod_flatten = false

[profit_taking.mandates.crypto]
enabled = true
mandate_type = "crypto_synthetic_harvest"
harvest_priority = 80
tp1_target_pct = 0.015
tp1_size = 0.50
runner_tp_mult = 2.0
trailing_stop_pct = 0.0125
max_giveback_pct = 0.30
min_harvest_ratio = 0.50
stale_winner_days = 2
allow_reentry_after_partial = false
eod_flatten = false
